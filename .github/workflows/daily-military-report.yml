name: Live Military Flight Collector

on:
  schedule:
    # Co 5 minut. Strefa Europe/Warsaw uwzględnia CET/CEST.
    - cron: "*/5 * * * *"
      timezone: "Europe/Warsaw"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-military-flight-collector
  cancel-in-progress: false

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TZ: Europe/Warsaw
      DATABASE_PATH: data/military_flights.sqlite3
      REPORTS_DIR: reports/hourly
      ADSB_API_URL: https://api.adsb.lol/v2/bbox/48.70/55.20/13.70/24.40
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect ADS-B snapshot and generate hourly report
        run: |
          python live_military_collector.py

      - name: Commit database and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/military_flights.sqlite3 reports/hourly/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: collect ADS-B snapshot $(TZ=Europe/Warsaw date '+%F %H:%M')"
          git pull --rebase origin "${{ github.ref_name }}"
          git push
