name: Live Military Flight Collector

on:
  schedule:
    # Co 5 minut, według czasu polskiego (CET/CEST).
    - cron: "*/5 * * * *"
      timezone: "Europe/Warsaw"

  # Pozwala uruchomić workflow ręcznie z zakładki Actions.
  workflow_dispatch:
    inputs:
      force_report:
        description: "Wymuś stworzenie raportu za poprzednią pełną godzinę"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  # Nie pozwala, aby dwa runy jednocześnie zapisywały SQLite i robiły git push.
  group: live-military-flight-collector
  cancel-in-progress: false

jobs:
  collect-and-report:
    name: Collect ADS-B and generate hourly report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      TZ: Europe/Warsaw

      # Baza SQLite i raporty będą commitowane do repozytorium.
      DATABASE_PATH: data/military_flights.sqlite3
      REPORTS_DIR: reports/hourly

      # Poprawny endpoint: globalna lista oznaczonych obiektów wojskowych.
      # Skrypt filtruje potem wyłącznie pozycje nad Polską.
      ADSB_API_URL: https://api.adsb.lol/v2/mil

      # Opcjonalne powiadomienia Discord.
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      # Przechowuj obserwacje maks. 14 dni.
      RETENTION_DAYS: "14"

      # Przy ręcznym uruchomieniu można wymusić raport.
      FORCE_REPORT: ${{ github.event_name == 'workflow_dispatch' && inputs.force_report && '1' || '0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect ADS-B snapshot and create hourly report
        run: |
          python live_military_collector.py

      - name: Show generated files
        if: always()
        run: |
          echo "=== SQLite database ==="
          ls -lh data/ || true

          echo "=== Latest reports ==="
          ls -lht reports/hourly/ 2>/dev/null | head -n 15 || true

      - name: Commit database and reports
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/military_flights.sqlite3 reports/hourly/

          if git diff --cached --quiet; then
            echo "Brak zmian do zapisania."
            exit 0
          fi

          git commit -m "chore: collect ADS-B snapshot $(TZ=Europe/Warsaw date '+%F %H:%M LT')"

          # Chroni przed konfliktem, jeżeli branch otrzymał nowy commit.
          git pull --rebase origin "${{ github.ref_name }}"

          git push
